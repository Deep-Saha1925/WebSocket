<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Web Socket</h1>
    <div>
        <input type="text" placeholder="Enter message" id="messageInput">
        <ul id="messagesContainer"></ul>
        <button id="messageSendButton">Send</button>
    </div>
    <script>

        const messageInput = document.getElementById('messageInput');
        const messageSendBtn = document.getElementById('messageSendButton');
        const messagesContainer = document.getElementById("messagesContainer");

        const { port } = window.location
        const connection = new WebSocket(`ws://localhost:${port}`);

        connection.onopen = () => {

            connection.onmessage = (message) => {
                console.log(message);

                const rawData = message.data
                const parsedData = JSON.parse(rawData);
                const text = parsedData.message

                const li = document.createElement('li');
                li.innerText = text
                messagesContainer.appendChild(li);
            }

            messageSendBtn.addEventListener('click', (e) => {
                const value = messageInput.value;
                connection.send(JSON.stringify({message: value}));
            })
        }
    </script>
</body>
</html>
